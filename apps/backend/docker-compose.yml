services:
  postgres:
    image: postgres:16
    container_name: prodivix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prodivix
    ports:
      - '5432:5432'
    volumes:
      - prodivix-postgres-data:/var/lib/postgresql/data

volumes:
  prodivix-postgres-data:
