name: G2 Rootless Sandbox

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'apps/remote-runner-control-plane/**'
      - 'apps/remote-runner-worker/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/g2-rootless-sandbox.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'apps/remote-runner-control-plane/**'
      - 'apps/remote-runner-worker/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/g2-rootless-sandbox.yml'

concurrency:
  group: g2-rootless-sandbox-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rootless-podman:
    name: Rootless Podman Isolation Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/backend/go.mod
          cache-dependency-path: apps/backend/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript project references
        run: pnpm exec tsc -b --pretty false

      - name: Download Backend Go modules
        working-directory: apps/backend
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if GOPROXY=https://proxy.golang.org,direct go mod download; then
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            sleep "$((attempt * 5))"
          done

      - name: Install rootless Podman
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes podman uidmap slirp4netns fuse-overlayfs

          runner_user="$(id --user --name)"
          runner_uid="$(id --user)"
          grep --quiet "^${runner_user}:" /etc/subuid || sudo usermod --add-subuids 100000-165535 "${runner_user}"
          grep --quiet "^${runner_user}:" /etc/subgid || sudo usermod --add-subgids 100000-165535 "${runner_user}"

          sudo loginctl enable-linger "${runner_user}"
          sudo systemctl start "user@${runner_uid}.service"
          runtime_dir="/run/user/${runner_uid}"
          test -S "${runtime_dir}/bus"
          echo "XDG_RUNTIME_DIR=${runtime_dir}" >> "${GITHUB_ENV}"
          echo "DBUS_SESSION_BUS_ADDRESS=unix:path=${runtime_dir}/bus" >> "${GITHUB_ENV}"

          mkdir --parents "${HOME}/.config/containers"
          printf '[engine]\ncgroup_manager="systemd"\nevents_logger="file"\n' > "${HOME}/.config/containers/containers.conf"

      - name: Verify rootless engine
        shell: bash
        run: |
          test "$(id --user)" -ne 0
          podman system migrate
          test "$(podman info --format '{{.Host.Security.Rootless}}')" = 'true'
          podman info --format json > rootless-podman-info.json

      - name: Run isolated Server Function import graph contract Gate
        run: pnpm run verify:g2:isolated-server-import-graph

      - name: Run Auth and Server Runtime Golden target matrix
        run: pnpm run verify:g2:auth-server-golden

      - name: Run authenticated, permission, sealed Secret and worker-attempt recovery Gate
        run: pnpm run verify:g2:isolated-server-secret-recovery

      - name: Run isolation Gate
        shell: bash
        env:
          PRODIVIX_ROOTLESS_EVIDENCE_PATH: rootless-sandbox-gate.json
          REMOTE_WORKER_TOKEN: g2-rootless-gate-canary-not-secret
        run: |
          set -o pipefail
          install_network="prodivix-g2-install-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          proxy_egress_network="prodivix-g2-proxy-egress-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          proxy_container="prodivix-g2-install-proxy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          proxy_image="localhost/prodivix-install-proxy:gate"

          base_image="docker.io/library/node:22-bookworm-slim"
          podman pull "${base_image}"
          base_digest="$(podman image inspect --format '{{.Digest}}' "${base_image}")"
          podman build \
            --pull=never \
            --build-arg "NODE_IMAGE=docker.io/library/node@${base_digest}" \
            --file apps/remote-runner-worker/install-proxy/Dockerfile \
            --tag "${proxy_image}" \
            .

          podman network create --internal "${install_network}"
          podman network create "${proxy_egress_network}"
          podman run \
            --detach \
            --name "${proxy_container}" \
            --network "${proxy_egress_network}" \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 64 \
            --memory 256m \
            --env PRODIVIX_INSTALL_EGRESS_ALLOWLIST=registry.npmjs.org \
            "${proxy_image}"
          podman network connect "${install_network}" "${proxy_container}"
          cleanup() {
            podman rm --force --ignore "${proxy_container}"
            podman network rm --force "${install_network}" "${proxy_egress_network}"
          }
          trap cleanup EXIT

          export PRODIVIX_ROOTLESS_INSTALL_NETWORK="${install_network}"
          export PRODIVIX_ROOTLESS_INSTALL_PROXY_URL="http://${proxy_container}:8080/"
          export PRODIVIX_ROOTLESS_INSTALL_PROXY_CONTAINER="${proxy_container}"
          set +e
          pnpm run verify:g2:rootless-sandbox 2>&1 | tee rootless-sandbox-gate.log
          gate_status="${PIPESTATUS[0]}"
          set -e
          podman logs "${proxy_container}" > rootless-install-egress-traces.jsonl
          exit "${gate_status}"

      - name: Upload Gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: g2-rootless-sandbox-evidence
          path: |
            rootless-podman-info.json
            rootless-sandbox-gate.json
            rootless-sandbox-gate.log
            rootless-install-egress-traces.jsonl
          if-no-files-found: warn
          retention-days: 14
