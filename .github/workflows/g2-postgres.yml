name: G2 PostgreSQL Gates

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'apps/remote-runner-control-plane/**'
      - 'packages/runtime-core/**'
      - 'packages/runtime-remote/**'
      - 'packages/runtime-remote-postgres/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/g2-postgres.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'apps/remote-runner-control-plane/**'
      - 'packages/runtime-core/**'
      - 'packages/runtime-remote/**'
      - 'packages/runtime-remote-postgres/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/g2-postgres.yml'

concurrency:
  group: g2-postgres-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  postgres-contracts:
    name: Remote Control Plane, Regional DR, Data/Server Replay, Viewer Authority, and Asset Retention
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prodivix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d prodivix_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      PRODIVIX_REMOTE_POSTGRES_TEST_URL: postgres://postgres:postgres@127.0.0.1:5432/prodivix_test?sslmode=disable
      PRODIVIX_BACKEND_POSTGRES_TEST_URL: postgres://postgres:postgres@127.0.0.1:5432/prodivix_test?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/backend/go.mod
          cache-dependency-path: apps/backend/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Remote Control Plane PostgreSQL Gate
        run: pnpm run test:remote-postgres

      - name: Run regional PostgreSQL, Worker, and traffic DR drill
        run: pnpm run verify:g2:regional-dr

      - name: Run Backend Data replay PostgreSQL Gate
        working-directory: apps/backend
        run: go test ./internal/modules/remoteexecution -run '^TestDataGatewayMutationReplayPostgreSQLGate$' -count=1 -v

      - name: Run Backend Server Function live mutation PostgreSQL Gate
        working-directory: apps/backend
        run: go test ./internal/modules/remoteexecution -run '^TestServerFunctionLiveMutationPostgreSQLGate$' -count=1 -v

      - name: Run authenticated Vue Catalog Remote PostgreSQL Golden
        working-directory: apps/backend
        run: go test ./internal/modules/remoteexecution -run '^TestAuthenticatedCatalogRemotePostgreSQLGolden$' -count=1 -v

      - name: Run Backend collaborator roles authority PostgreSQL Gate
        working-directory: apps/backend
        run: go test ./internal/modules/remoteexecution -run '^TestWorkspaceExecutionCollaboratorRolesPostgreSQLGate$' -count=1 -v

      - name: Run Backend Environment Secret KMS rotation PostgreSQL Gate
        working-directory: apps/backend
        run: go test ./internal/modules/environment -run '^TestEnvironmentSecretKeyRotationPostgreSQLGate$' -count=1 -v

      - name: Run Backend static-to-managed KMS migration PostgreSQL Gate
        working-directory: apps/backend
        run: go test ./internal/modules/environment -run '^TestEnvironmentSecretAWSKMSMigrationPostgreSQLGate$' -count=1 -v

      - name: Run Backend Binary Asset retention PostgreSQL Gate
        working-directory: apps/backend
        run: go test ./internal/modules/workspace -run '^TestWorkspaceAssetBlobRetentionPostgreSQLGate$' -count=1 -v

      - name: Run Backend PIR wire persistence rollout PostgreSQL Gate
        working-directory: apps/backend
        run: go test ./internal/platform/database -run '^TestPIRWireMigrationPostgreSQLGate$' -count=1 -v
