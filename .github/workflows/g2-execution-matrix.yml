name: G2 Execution Contract Matrix

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/golden-conformance/**'
      - 'packages/prodivix-compiler/**'
      - 'packages/runtime-browser/**'
      - 'packages/runtime-core/**'
      - 'packages/runtime-remote/**'
      - 'packages/runtime-vitest/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/g2-execution-matrix.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/golden-conformance/**'
      - 'packages/prodivix-compiler/**'
      - 'packages/runtime-browser/**'
      - 'packages/runtime-core/**'
      - 'packages/runtime-remote/**'
      - 'packages/runtime-vitest/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/g2-execution-matrix.yml'

concurrency:
  group: g2-execution-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  browser-remote-contracts:
    name: Browser Remote Golden Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Golden execution contract matrix
        run: pnpm run verify:g2:execution-matrix
