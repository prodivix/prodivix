name: G2 Execution Contract Matrix

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/golden-conformance/**'
      - 'packages/prodivix-compiler/**'
      - 'packages/runtime-browser/**'
      - 'packages/runtime-core/**'
      - 'packages/runtime-remote/**'
      - 'packages/runtime-vitest/**'
      - 'packages/server-runtime/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/g2-execution-matrix.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/golden-conformance/**'
      - 'packages/prodivix-compiler/**'
      - 'packages/runtime-browser/**'
      - 'packages/runtime-core/**'
      - 'packages/runtime-remote/**'
      - 'packages/runtime-vitest/**'
      - 'packages/server-runtime/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/g2-execution-matrix.yml'

concurrency:
  group: g2-execution-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  browser-remote-contracts:
    name: Browser Remote and Auth Server Golden Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript project references
        run: pnpm exec tsc -b --pretty false

      - name: Run Golden execution contract matrix
        run: pnpm run verify:g2:execution-matrix

      - name: Run Auth and Server Runtime Golden target matrix
        run: pnpm run verify:g2:auth-server-golden
