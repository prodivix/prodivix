name: G2 Managed KMS

on:
  workflow_dispatch:

concurrency:
  group: g2-managed-kms-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  aws-kms:
    name: AWS KMS Envelope Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: g2-managed-kms

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate protected managed KMS inputs
        shell: bash
        env:
          PRODIVIX_AWS_KMS_TEST_ROLE_ARN: ${{ secrets.PRODIVIX_AWS_KMS_TEST_ROLE_ARN }}
          PRODIVIX_AWS_KMS_TEST_REGION: ${{ vars.PRODIVIX_AWS_KMS_TEST_REGION }}
          PRODIVIX_AWS_KMS_TEST_OLD_KEY_ARN: ${{ vars.PRODIVIX_AWS_KMS_TEST_OLD_KEY_ARN }}
          PRODIVIX_AWS_KMS_TEST_ACTIVE_KEY_ARN: ${{ vars.PRODIVIX_AWS_KMS_TEST_ACTIVE_KEY_ARN }}
          PRODIVIX_AWS_KMS_TEST_REPLICA_REGION: ${{ vars.PRODIVIX_AWS_KMS_TEST_REPLICA_REGION }}
          PRODIVIX_AWS_KMS_TEST_ACTIVE_REPLICA_KEY_ARN: ${{ vars.PRODIVIX_AWS_KMS_TEST_ACTIVE_REPLICA_KEY_ARN }}
        run: |
          required=(
            PRODIVIX_AWS_KMS_TEST_ROLE_ARN
            PRODIVIX_AWS_KMS_TEST_REGION
            PRODIVIX_AWS_KMS_TEST_OLD_KEY_ARN
            PRODIVIX_AWS_KMS_TEST_ACTIVE_KEY_ARN
            PRODIVIX_AWS_KMS_TEST_REPLICA_REGION
            PRODIVIX_AWS_KMS_TEST_ACTIVE_REPLICA_KEY_ARN
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error title=Managed KMS configuration missing::${name} is required by the protected live Gate."
              exit 1
            fi
          done

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/backend/go.mod
          cache-dependency-path: apps/backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Remote Terminal managed KMS contracts
        run: pnpm run verify:g2:terminal-managed-kms

      - name: Verify Environment Secret managed KMS contracts
        run: pnpm run verify:g2:environment-secret-managed-kms

      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.PRODIVIX_AWS_KMS_TEST_ROLE_ARN }}
          aws-region: ${{ vars.PRODIVIX_AWS_KMS_TEST_REGION }}
          role-session-name: prodivix-g2-managed-kms-${{ github.run_id }}

      - name: Run live managed KMS envelope and rotation Gate
        working-directory: apps/backend
        env:
          PRODIVIX_AWS_KMS_TEST_REGION: ${{ vars.PRODIVIX_AWS_KMS_TEST_REGION }}
          PRODIVIX_AWS_KMS_TEST_OLD_KEY_ARN: ${{ vars.PRODIVIX_AWS_KMS_TEST_OLD_KEY_ARN }}
          PRODIVIX_AWS_KMS_TEST_ACTIVE_KEY_ARN: ${{ vars.PRODIVIX_AWS_KMS_TEST_ACTIVE_KEY_ARN }}
          PRODIVIX_AWS_KMS_TEST_REPLICA_REGION: ${{ vars.PRODIVIX_AWS_KMS_TEST_REPLICA_REGION }}
          PRODIVIX_AWS_KMS_TEST_ACTIVE_REPLICA_KEY_ARN: ${{ vars.PRODIVIX_AWS_KMS_TEST_ACTIVE_REPLICA_KEY_ARN }}
        run: go test ./internal/modules/environment -run '^TestEnvironmentSecretAWSKMS(LiveGate|MultiRegionLiveGate)$' -count=1 -v

      - name: Run live Remote Terminal managed KMS recovery Gate
        env:
          PRODIVIX_AWS_KMS_TEST_REGION: ${{ vars.PRODIVIX_AWS_KMS_TEST_REGION }}
          PRODIVIX_AWS_KMS_TEST_OLD_KEY_ARN: ${{ vars.PRODIVIX_AWS_KMS_TEST_OLD_KEY_ARN }}
          PRODIVIX_AWS_KMS_TEST_ACTIVE_KEY_ARN: ${{ vars.PRODIVIX_AWS_KMS_TEST_ACTIVE_KEY_ARN }}
          PRODIVIX_AWS_KMS_TEST_REPLICA_REGION: ${{ vars.PRODIVIX_AWS_KMS_TEST_REPLICA_REGION }}
          PRODIVIX_AWS_KMS_TEST_ACTIVE_REPLICA_KEY_ARN: ${{ vars.PRODIVIX_AWS_KMS_TEST_ACTIVE_REPLICA_KEY_ARN }}
        run: pnpm --filter @prodivix/remote-runner-control-plane test:aws-kms-gate
