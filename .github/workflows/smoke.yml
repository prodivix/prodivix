name: Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'apps/plugin-sandbox/**'
      - 'packages/**'
      - 'scripts/plugin-artifacts/**'
      - 'tests/e2e/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/smoke.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'apps/plugin-sandbox/**'
      - 'packages/**'
      - 'scripts/plugin-artifacts/**'
      - 'tests/e2e/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/smoke.yml'

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-smoke:
    name: Web smoke and official plugin gates
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check official plugin cutover
        run: pnpm run check:official-plugin-cutover

      - name: Install Playwright browser matrix
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Run Chromium smoke and official plugin conformance
        run: pnpm run test:e2e:smoke:chromium

      - name: Run plugin sandbox browser matrix
        run: pnpm run test:e2e:plugin-sandbox:matrix

      - name: Test official plugin exports
        run: pnpm run test:official-plugin-exports

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
