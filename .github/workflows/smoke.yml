name: Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'apps/plugin-sandbox/**'
      - 'packages/**'
      - 'scripts/plugin-artifacts/**'
      - 'tests/e2e/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/smoke.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'apps/plugin-sandbox/**'
      - 'packages/**'
      - 'scripts/plugin-artifacts/**'
      - 'tests/e2e/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/smoke.yml'

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-smoke:
    name: Web smoke and official plugin gates
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check official plugin cutover
        run: pnpm run check:official-plugin-cutover

      - name: Install Playwright browser matrix
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Run Chromium smoke and official plugin conformance
        run: pnpm run test:e2e:smoke:chromium

      - name: Run Binary Asset product journey Gate
        run: pnpm run verify:g2:binary-assets:browser

      - name: Run plugin sandbox browser matrix
        run: pnpm run test:e2e:plugin-sandbox:matrix

      - name: Test official plugin exports
        run: pnpm run test:official-plugin-exports

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
