name: Docs Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/docs/**'
      - 'packages/shared/**'
      - 'packages/themes/**'
      - 'packages/ui/**'
      - 'packages/plugin-contracts/src/diagnostics.ts'
      - 'specs/diagnostics/**'
      - 'scripts/generate-diagnostic-docs.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/docs-pages.yml'

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          VITEPRESS_BASE: /prodivix/
        run: pnpm build:docs

      - name: Verify docs base path
        shell: bash
        run: |
          grep -q '\\"base\\":\\"/prodivix/\\"' apps/docs/.vitepress/dist/index.html
          grep -q 'href="/prodivix/assets/' apps/docs/.vitepress/dist/index.html
          grep -q 'src="/prodivix/assets/' apps/docs/.vitepress/dist/index.html
          grep -q 'href="/prodivix/guide/introduction.html"' apps/docs/.vitepress/dist/index.html

      - name: Build Storybook
        run: pnpm build-storybook:ui

      - name: Assemble Pages artifact
        shell: bash
        run: |
          rm -rf .pages
          mkdir -p .pages/storybook
          cp -R apps/docs/.vitepress/dist/. .pages/
          cp -R packages/ui/storybook-static/. .pages/storybook/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: .pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
