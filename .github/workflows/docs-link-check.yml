name: Docs Link Check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/docs/**'
      - 'packages/plugin-contracts/src/diagnostics.ts'
      - 'specs/diagnostics/**'
      - 'scripts/generate-diagnostic-docs.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/docs-link-check.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/docs/**'
      - 'packages/plugin-contracts/src/diagnostics.ts'
      - 'specs/diagnostics/**'
      - 'scripts/generate-diagnostic-docs.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/docs-link-check.yml'

concurrency:
  group: docs-link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs with GitHub Pages base
        env:
          VITEPRESS_BASE: /prodivix/
        run: pnpm build:docs

      - name: Verify docs base path
        shell: bash
        run: |
          grep -q '\\"base\\":\\"/prodivix/\\"' apps/docs/.vitepress/dist/index.html
          grep -q 'href="/prodivix/assets/' apps/docs/.vitepress/dist/index.html
          grep -q 'src="/prodivix/assets/' apps/docs/.vitepress/dist/index.html
          grep -q 'href="/prodivix/guide/introduction.html"' apps/docs/.vitepress/dist/index.html
