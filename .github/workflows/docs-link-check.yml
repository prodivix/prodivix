name: Docs Link Check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/docs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/docs-link-check.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/docs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/docs-link-check.yml'

concurrency:
  group: docs-link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs with GitHub Pages base
        env:
          VITEPRESS_BASE: /prodivix/
        run: pnpm build:docs

      - name: Verify docs base path
        shell: bash
        run: |
          grep -q '\\"base\\":\\"/prodivix/\\"' apps/docs/.vitepress/dist/index.html
          grep -q 'href="/prodivix/assets/' apps/docs/.vitepress/dist/index.html
          grep -q 'src="/prodivix/assets/' apps/docs/.vitepress/dist/index.html
          grep -q 'href="/prodivix/guide/introduction.html"' apps/docs/.vitepress/dist/index.html
