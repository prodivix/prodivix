name: Deploy Smoke

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR image tag to deploy
        required: false
        default: latest
  push:
    branches:
      - main
    paths:
      - deploy/**
      - apps/backend/Dockerfile
      - apps/plugin-sandbox/**
      - apps/web/Dockerfile
      - .dockerignore
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-smoke.yml

concurrency:
  group: deploy-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build current deployment images
        if: github.event_name == 'push'
        env:
          IMAGE_TAG: deploy-smoke-${{ github.sha }}
        run: |
          docker build --file apps/backend/Dockerfile --tag "ghcr.io/mdr-tutorials/prodivix-backend:$IMAGE_TAG" .
          docker build --file apps/plugin-sandbox/Dockerfile --tag "ghcr.io/mdr-tutorials/prodivix-plugin-sandbox:$IMAGE_TAG" .
          docker build --file apps/web/Dockerfile --build-arg VITE_API_BASE=/ --build-arg VITE_PLUGIN_SANDBOX_URL=http://127.0.0.1:4174/runtime-broker.html --tag "ghcr.io/mdr-tutorials/prodivix-web:$IMAGE_TAG" .

      - name: Run current-source deployment
        if: github.event_name == 'push'
        working-directory: deploy
        env:
          IMAGE_TAG: deploy-smoke-${{ github.sha }}
        run: |
          chmod +x ./start-app.sh
          ./start-app.sh --yes --skip-pull --tag "$IMAGE_TAG"

      - name: Run published-image deployment
        if: github.event_name == 'workflow_dispatch'
        working-directory: deploy
        env:
          IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
        run: |
          chmod +x ./start-app.sh
          ./start-app.sh --yes --tag "$IMAGE_TAG"

      - name: Check backend health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/ping; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f deploy/docker-compose.ghcr.yml --env-file deploy/.env logs backend
          exit 1

      - name: Check web response
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsSI http://127.0.0.1:4173/ | grep -qi '^HTTP/.* 200'; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f deploy/docker-compose.ghcr.yml --env-file deploy/.env logs web
          exit 1

      - name: Verify production plugin sandbox policy
        run: node apps/plugin-sandbox/scripts/verify-deployment.mjs http://127.0.0.1:4174

      - name: Show service status
        if: always()
        run: |
          if [[ -f deploy/.env ]]; then
            docker compose -f deploy/docker-compose.ghcr.yml --env-file deploy/.env ps
          else
            echo "Deployment environment was not created; skipping service status."
          fi

      - name: Stop deployment
        if: always()
        run: |
          if [[ -f deploy/.env ]]; then
            docker compose -f deploy/docker-compose.ghcr.yml --env-file deploy/.env down --remove-orphans
          else
            echo "Deployment environment was not created; skipping cleanup."
          fi
